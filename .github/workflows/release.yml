name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Linux binary
        run: |
          chmod +x scripts/build-linux-binary.sh
          ./scripts/build-linux-binary.sh

      - name: Package Linux artifact
        run: |
          tar -czf weewx-dashboard-linux-x86_64.tar.gz -C dist weewx-dashboard

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: weewx-dashboard-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows binary
        run: |
          ./scripts/build-windows.ps1
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          ./scripts/build-windows-installer.ps1
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: |
            dist/weewx-dashboard/**
            dist/installer/WeeWXDashboardSetup.exe

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/weewx-dashboard-linux-x86_64.tar.gz
            release-assets/dist/installer/WeeWXDashboardSetup.exe
